name: Release

# Branch-driven releases: pushing release/v<semver> publishes a GitHub
# release for that version. A hyphenated version (release/v0.1.0-beta) is
# published as a pre-release. The release tag (v<semver>) is created
# automatically by the release itself — no manual tag management.
on:
  push:
    branches:
      - "release/v*"

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish
    runs-on: macos-26
    # Must cover a cold SwiftPM build plus the serial test suite plus
    # packaging — same reasoning as ci.yml's timeout.
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Same cache as ci.yml so a release run usually restores the warm
      # build state seeded by CI on main.
      - name: Cache SwiftPM build
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Derive version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION="${BRANCH#release/v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "Branch '$BRANCH' does not encode a version (expected release/v<major>.<minor>.<patch>[-suffix])." >&2
            exit 1
          fi
          PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (prerelease: $PRERELEASE)"

      - name: Require green CI on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CONCLUSION="$(gh run list \
            --workflow ci.yml \
            --branch main \
            --status completed \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // empty')"
          if [[ "$CONCLUSION" != "success" ]]; then
            echo "Latest completed CI run on main is '${CONCLUSION:-none}' — releases require green CI on main." >&2
            exit 1
          fi
          echo "CI on main is green."

      - name: Show Swift toolchain
        run: swift --version

      - name: Stamp version into sources
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -E -i '' \
            "s/(public static let version = \")[^\"]+(\")/\\1${VERSION}\\2/" \
            Sources/RafuCore/BuildInformation.swift
          grep -F "version = \"${VERSION}\"" Sources/RafuCore/BuildInformation.swift

      - name: Verify (format, build, tests, staged bundle)
        # --no-parallel for the same reason as ci.yml: serial execution
        # avoids parallel-executor starvation on hosted runners and makes a
        # genuinely hung test identifiable as the last "started" log line.
        env:
          RAFU_TEST_FLAGS: --no-parallel
        run: ./script/verify.sh

      - name: Package app bundle
        env:
          RAFU_VERSION: ${{ steps.version.outputs.version }}
        run: |
          ./script/build_and_run.sh --package
          test "$(plutil -extract CFBundleShortVersionString raw dist/Rafu.app/Contents/Info.plist)" = "$RAFU_VERSION"

      - name: Zip app bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ditto -c -k --keepParent dist/Rafu.app "Rafu-v${VERSION}-macos-arm64.zip"
          shasum -a 256 "Rafu-v${VERSION}-macos-arm64.zip" | tee checksum.txt

      - name: Write release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CHECKSUM="$(cut -d' ' -f1 checksum.txt)"
          cat > release-notes.md <<NOTES
          ## Rafu v${VERSION}

          Native macOS repository companion. Apple Silicon build.

          ### Install

          1. Download and unzip \`Rafu-v${VERSION}-macos-arm64.zip\`.
          2. Move \`Rafu.app\` wherever you like (e.g. \`/Applications\`).
          3. Rafu is not yet signed or notarized, so remove the quarantine
             flag once before first launch:

             \`\`\`sh
             xattr -dr com.apple.quarantine /path/to/Rafu.app
             \`\`\`

          4. Launch Rafu.

          SHA-256: \`${CHECKSUM}\`

          Built from \`${GITHUB_REF_NAME}\` @ ${GITHUB_SHA}.
          NOTES

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          TAG="v${VERSION}"
          ASSET="Rafu-v${VERSION}-macos-arm64.zip"
          FLAGS=(--title "Rafu v${VERSION}" --notes-file release-notes.md)
          if [[ "$PRERELEASE" == "true" ]]; then
            FLAGS+=(--prerelease)
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating asset and notes."
            gh release upload "$TAG" "$ASSET" --clobber
            EDIT_FLAGS=(--title "Rafu v${VERSION}" --notes-file release-notes.md)
            if [[ "$PRERELEASE" == "true" ]]; then
              EDIT_FLAGS+=(--prerelease)
            else
              EDIT_FLAGS+=(--prerelease=false)
            fi
            gh release edit "$TAG" "${EDIT_FLAGS[@]}"
          else
            gh release create "$TAG" "$ASSET" \
              --target "$GITHUB_SHA" \
              "${FLAGS[@]}"
          fi
