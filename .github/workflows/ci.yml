name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Format, build, and test
    runs-on: macos-26
    # A cold SwiftPM build of the full package plus the test suite runs well
    # past 15 minutes on a hosted macOS runner; the cache below makes warm
    # runs much faster, but the timeout must still cover a cache miss.
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Show Swift toolchain
        run: swift --version

      # Restore compiled dependencies and incremental build state so warm
      # runs skip the cold SwiftPM compile that blew the old 15m timeout.
      # Keyed on Package.resolved (dependency graph) with the Swift version
      # in the key so a toolchain bump never reuses stale objects.
      - name: Cache SwiftPM build
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Verify package and CLI
        run: ./script/verify.sh
