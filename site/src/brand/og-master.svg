<svg xmlns="http://www.w3.org/2000/svg" width="630" height="630" viewBox="0 0 630 630">
  <!-- Square master: all meaningful content lives in the center band y∈[150,480],
       which becomes the 1200x630 og image after center-crop. -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#E3A857" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#E3A857" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#333D52" opacity="0.45"/>
    </pattern>
  </defs>
  <rect width="630" height="630" fill="#10141C"/>
  <rect width="630" height="630" fill="url(#dots)" opacity="0.3"/>
  <rect width="630" height="630" fill="url(#glow)"/>

  <!-- the seam mark -->
  <g transform="translate(277,166) scale(0.5)">
    <rect x="0" y="0" width="152" height="152" rx="34" fill="#151A24" stroke="#333D52" stroke-width="3"/>
    <rect x="28" y="30" width="43" height="92" rx="8" fill="#1E2634"/>
    <rect x="81" y="30" width="43" height="92" rx="8" fill="#1E2634"/>
    <polyline points="65,41 88,54 65,66 88,79 65,91 88,104 65,113"
              fill="none" stroke="#E3A857" stroke-width="6"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="315" y="356" text-anchor="middle" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="62" font-weight="700" letter-spacing="-2" fill="#E7EAF2">Rafu</text>
  <text x="315" y="402" text-anchor="middle" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="400" fill="#9AA3B8">The agent weaves. <tspan font-family="Georgia, serif" font-style="italic" fill="#E3A857">You mend.</tspan></text>
  <text x="315" y="438" text-anchor="middle" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="400" fill="#67718A">A native macOS repository companion</text>

  <!-- the running stitch, bottom edge of the safe band -->
  <polyline points="30,468 41,462 52,468 63,462 74,468 85,462 96,468 107,462 118,468 129,462 140,468 151,462 162,468 173,462 184,468 195,462 206,468 217,462 228,468 239,462 250,468 261,462 272,468 283,462 294,468 305,462 316,468 327,462 338,468 349,462 360,468 371,462 382,468 393,462 404,468 415,462 426,468 437,462 448,468 459,462 470,468 481,462 492,468 503,462 514,468 525,462 536,468 547,462 558,468 569,462 580,468 591,462 600,466"
            fill="none" stroke="#E3A857" stroke-width="1.8" opacity="0.5"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
